<head>
  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      background:#111827;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:#e5e7eb;
    }

    .site-root{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .global-header{
      position:sticky;
      top:0;
      z-index:50;
      background:#ffffff;
      border-bottom:3px solid #e5e7eb;
      box-shadow:0 2px 4px rgba(15,23,42,0.08);
    }

    .header-inner{
      width:100%;
      margin:0;
      height:80px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 24px 0 8px; 
    }

    .header-left{
      display:flex;
      align-items:center;
    }

    .home-logo{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:#111827;
    }
    .home-logo span{
      font-size:22px;
      font-weight:900;
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    .header-center{
      flex:1;
      display:flex;
      justify-content:center;
      gap:32px;
    }

    .nav-item{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      cursor:pointer;
      padding:4px 2px;
      min-width:80px;
    }

    .nav-link-inner{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      text-decoration:none;
    }

    .nav-icon-placeholder{
      width:32px;
      height:32px;
    }

    .nav-label{
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
      color:#111827;
    }

    .nav-label.active{
      color:#2563eb;
    }

    .nav-item::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-10px;
      transform:translateX(-50%);
      width:0;
      height:3px;
      background:#2563eb;
      border-radius:999px;
      transition:width 0.16s ease-out;
    }

    .nav-item:hover::after{
      width:60%;
    }
    .nav-item.active::after{
      width:80%;
    }

    .header-right{
      display:flex;
      align-items:center;
      gap:16px;
      padding-right:4px;
    }

    .header-right a{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .ext-icon{
      width:32px;
      height:32px;
      cursor:pointer;
      border:none;
      background:transparent;
      padding:0;
      transition:transform 0.12s ease-out, filter 0.12s ease-out;
      display:block;
    }
    .header-right a:hover .ext-icon{
      transform:scale(1.05);
      filter:brightness(1.05);
    }

    .main-wrap{
      flex:1;
      background:#020617;
      padding:24px 24px 40px;
      display:flex;
      gap:24px;
    }

    .left-games{
      width:220px;
      background:rgba(15,23,42,0.96);
      border-radius:18px;
      padding:16px 14px;
      box-shadow:0 10px 30px rgba(15,23,42,0.8);
      display:flex;
      flex-direction:column;
      gap:6px;
      align-self:flex-start;
      position:sticky;
      top:96px;
    }

    .game-link{
      display:block;
      padding:9px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:500;
      text-decoration:none;
      color:#e5e7eb;
      background:transparent;
      transition:background 0.12s ease-out, color 0.12s ease-out, transform 0.08s ease-out;
    }
    .game-link:hover{
      background:rgba(55,65,81,0.95);
      transform:translateY(-1px);
    }
    .game-link.active{
      background:#facc15;
      color:#111827;
    }

    .right-guides{
      flex:1;
      min-width:0;
      color:#e5e7eb;
    }

    .right-title{
      font-size:26px;
      font-weight:800;
      margin:4px 0 10px;
    }

    .right-sub{
      margin:0 0 24px;
      font-size:14px;
      line-height:1.7;
      color:#d1d5db;
      white-space:pre-line;
    }

    .guide-section{
      background:rgba(15,23,42,0.96);
      border-radius:20px;
      padding:18px 18px 16px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,0.9);
    }

    .guide-label{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:4px 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      letter-spacing:0.08em;
      text-transform:uppercase;
      background:linear-gradient(90deg,#ff0000 100%);
      color:#f9fafb;
      margin-bottom:10px;
    }

    .guide-body{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .guide-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 14px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.5);
      font-size:13px;
      text-decoration:none;
      color:#e5e7eb;
      background:rgba(15,23,42,0.8);
      backdrop-filter:blur(6px);
      transition:background 0.12s ease-out, border-color 0.12s ease-out,
                 transform 0.08s ease-out, box-shadow 0.12s ease-out;
    }
    .guide-chip:hover{
      background:rgba(248,250,252,0.08);
      border-color:rgba(250,204,21,0.7);
      box-shadow:0 0 0 1px rgba(250,204,21,0.7);
      transform:translateY(-1px);
    }

    @media (max-width:900px){
      .header-inner{
        padding:0 12px 0 8px;
        height:72px;
      }
      .header-center{
        gap:18px;
      }
      .home-logo span{
        font-size:20px;
      }
      .main-wrap{
        flex-direction:column;
        padding:18px 16px 32px;
      }
      .left-games{
        position:relative;
        top:0;
        width:100%;
        flex-direction:row;
        overflow-x:auto;
        white-space:nowrap;
      }
      .game-link{
        flex-shrink:0;
        white-space:nowrap;
      }
    }

    @media (max-width:600px){
      .header-center{
        gap:12px;
      }
      .nav-label{
        font-size:12px;
      }
      .right-title{
        font-size:22px;
      }
    }

    .dropdown{
      position:absolute;
      top:100%;
      left:50%;
      transform:translateX(-50%);
      margin-top:10px;
      background:#ffffff;
      border-radius:12px;
      border:1px solid #d1d5db;
      box-shadow:0 8px 16px rgba(15,23,42,0.18);
      min-width:180px;
      overflow:hidden;
      z-index:60;
      display:none;
    }

    .nav-item:hover .dropdown{
      display:block;
    }

    .header-center .nav-item.open .dropdown{
      display:block;
    }

    .header-center .nav-item::before{
      content:"";
      position:absolute;
      top:100%;
      left:0;
      width:100%;
      height:10px;
    }

    .dropdown-item{
      display:block;
      width:100%;
      padding:9px 14px;
      font-size:14px;
      font-weight:500;
      text-align:center;
      border-bottom:1px solid #e5e7eb;
      background:#ffffff;
      color:#111827;
      text-decoration:none;
      white-space:nowrap;
    }
    .dropdown-item:last-child{
      border-bottom:none;
    }
    .dropdown-item:hover{
      background:#f3f4f6;
    }
  </style>
