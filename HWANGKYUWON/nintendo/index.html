<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Nintendo 홈</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- React + Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body{
      margin:0;
      background:#111827;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:#111827;
    }

    .site-root{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* ========== 상단 배너 ========== */
    .global-header{
      position:sticky;
      top:0;
      z-index:50;
      background:#ffffff;
      border-bottom:3px solid #e5e7eb;
      box-shadow:0 2px 4px rgba(15,23,42,0.08);
    }

    .header-inner{
      width:100%;
      margin:0;                 /* 전체 폭 사용 */
      height:80px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 24px 0 8px;     /* 왼쪽 거의 끝까지 붙도록 */
    }

    /* 왼쪽 HOME 로고 */
    .header-left{
      display:flex;
      align-items:center;
    }

    .home-logo{
      border:none;
      background:transparent;
      padding:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      color:#111827;
    }
    .home-logo span{
      font-size:22px;
      font-weight:900;
      letter-spacing:0.08em;
      text-transform:uppercase;
    }

    /* 가운데 카테고리 */
    .header-center{
      flex:1;
      display:flex;
      justify-content:center;
      gap:32px;
    }

    .nav-item{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      cursor:pointer;
      padding:4px 2px;
      min-width:80px;
    }

    .nav-link-inner{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      text-decoration:none;
      user-select:none;
    }

    .nav-icon-placeholder{
      width:32px;
      height:32px; /* 아이콘 넣을 자리 */
    }

    .nav-label{
      font-size:14px;
      font-weight:700;
      white-space:nowrap;
      color:#111827;
    }

    .nav-label.active{
      color:#2563eb;
    }

    .nav-item::after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-10px;
      transform:translateX(-50%);
      width:0;
      height:3px;
      background:#2563eb;
      border-radius:999px;
      transition:width 0.16s ease-out;
    }

    .nav-item:hover::after{
      width:60%;
    }
    .nav-item.active::after{
      width:80%;
    }

    /* 오른쪽 외부 링크 */
    .header-right{
      display:flex;
      align-items:center;
      gap:16px;
      padding-right:4px;
    }

    .header-right a{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .ext-icon{
      width:32px;
      height:32px;
      cursor:pointer;
      border:none;
      background:transparent;
      padding:0;
      transition:transform 0.12s ease-out, filter 0.12s ease-out;
      display:block;
    }
    .header-right a:hover .ext-icon{
      transform:scale(1.05);
      filter:brightness(1.05);
    }

    /* ====== 드롭다운 : 각 게임 배너 바로 아래 (PT와 동일) ====== */
    .dropdown{
      position:absolute;
      top:100%;
      left:50%;
      transform:translateX(-50%);
      margin-top:10px;
      background:#ffffff;
      border-radius:12px;
      border:1px solid #d1d5db;
      box-shadow:0 8px 16px rgba(15,23,42,0.18);
      min-width:180px;
      overflow:hidden;
      z-index:60;
      display:none;
    }

    /* nav-item 위에 마우스 올리면 보이게 */
    .nav-item:hover .dropdown{
      display:block;
    }

    /* 클릭 고정(모바일/PC 공통) */
    .header-center .nav-item.open .dropdown{
      display:block;
    }

    /* 배너↔드롭다운 사이 빈틈( margin-top:10px )을 메워 hover 끊김 방지 */
    .header-center .nav-item::before{
      content:"";
      position:absolute;
      top:100%;
      left:0;
      width:100%;
      height:10px;
    }

    .dropdown-item{
      display:block;
      width:100%;
      padding:9px 14px;
      font-size:14px;
      font-weight:500;
      text-align:center;
      border:none;
      border-bottom:1px solid #e5e7eb;
      background:#ffffff;
      color:#111827;
      cursor:pointer;
      white-space:nowrap;
    }

    .dropdown-item:last-child{
      border-bottom:none;
    }

    .dropdown-item:hover{
      background:#f3f4f6;
    }

    /* ========== 메인 : 풀스크린 슬라이드 ========== */
    .main-wrap{
      flex:1;
      background:#020617;
    }

    .slider-root{
      width:100%;
      height:calc(100vh - 80px);      /* 헤더 제외 전체 화면 */
      max-height:780px;
      position:relative;
      overflow:hidden;
      background:#000;
    }

    .slider-bg{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      transform:scale(1.02);
      transition:background-image 0.4s ease-out;
      cursor:pointer;
    }

    /* 아래쪽 그라디언트 바(포켓몬코리아 느낌) */
    .slider-gradient-bar{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:90px;
      background: linear-gradient(90deg, #ff0000 0%, #ff0000 0%, #ffffff 100%);
    }

    /* 중앙 하단 패널 – 이벤트/공지 배너 */
    .slider-center-panel{
      position:absolute;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      color:#f9fafb;
    }

    .event-banner{
      display:flex;
      align-items:center;
      gap:12px;
      padding:9px 22px;
      border-radius:999px;
      background:rgba(15,23,42,0.9);
      box-shadow:0 4px 10px rgba(15,23,42,0.7);
      font-size:13px;
      font-weight:600;
    }

    .event-link{
      text-decoration:none;
      color:#f9fafb;
      padding:4px 10px;
      border-radius:999px;
      background:transparent;
      transition:background 0.12s ease-out, color 0.12s ease-out;
    }

    .event-link:hover{
      background:#f9fafb;
      color:#111827;
    }

    .event-dot{
      width:4px;
      height:4px;
      border-radius:999px;
      background:#e5e7eb;
    }

    /* 좌우 화살표 */
    .slider-arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:64px;
      height:64px;
      border-radius:999px;
      border:none;
      background:#ffffff;
      box-shadow:0 4px 10px rgba(15,23,42,0.35);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:26px;
      color:#111827;
      opacity:0.9;
      transition:transform 0.12s ease-out, box-shadow 0.12s ease-out, opacity 0.12s ease-out;
    }

    .slider-arrow:hover{
      transform:translateY(-50%) scale(1.05);
      box-shadow:0 6px 14px rgba(15,23,42,0.45);
      opacity:1;
    }

    .slider-arrow.left{
      left:40px;
    }
    .slider-arrow.right{
      right:40px;
    }

    /* 작은 인디케이터 점 */
    .slider-dots{
      position:absolute;
      bottom:100px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:6px;
      z-index:70;
    }
    .slider-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:rgba(15,23,42,0.35);
    }
    .slider-dot.active{
      width:22px;
      background:#f9fafb;
    }

    @media (max-width:900px){
      .header-inner{
        padding:0 12px 0 8px;
        height:72px;
      }
      .header-center{
        gap:18px;
      }
      .home-logo span{
        font-size:20px;
      }
      .slider-root{
        height:calc(100vh - 72px);
      }
      .slider-arrow{
        width:52px;
        height:52px;
        font-size:22px;
      }
      .slider-arrow.left{ left:18px; }
      .slider-arrow.right{ right:18px; }
    }

    @media (max-width:600px){
      .header-center{
        gap:12px;
      }
      .nav-label{
        font-size:12px;
      }
      .slider-gradient-bar{
        height:70px;
      }
      .event-banner{
        padding:7px 16px;
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ---------- 오른쪽 아이콘 / 링크 (기존 그대로) ---------- */
    const EXT_ICONS = {
      youtube: "../images/icon-youtube.png",
      blog:    "../images/icon-blog.png",
      cafe:    "../images/icon-cafe.png",
    };

    const EXTERNAL_LINKS = {
      youtube: "https://www.youtube.com/@HWANG_KYUWON",
      blog:    "https://blog.naver.com/rbdnjs119",
      cafe:    "https://cafe.naver.com/rbdnjs119",
    };

    /* 이벤트 / 공지사항 링크 – 필요하면 경로만 수정 */
    const EVENT_NOTICE_LINKS = {
      event: "#",      // 예: "event/index.html"
      notice: "#",     // 예: "notice/index.html"
    };

    const TAB_ORDER = [
      "pokemon",
      "animalcrossing",
      "mario",
      "zelda",
      "kirby",
      "nintendo",
      "etc"
    ];

    const TAB_INFO = {
      pokemon:        { label:"포켓몬스터",  folder:"pokemon" },
      animalcrossing: { label:"동물의 숲",   folder:"animalcrossing" },
      mario:          { label:"마리오",      folder:"mario" },
      zelda:          { label:"젤다의 전설", folder:"zelda" },
      kirby:          { label:"별의 커비",   folder:"kirby" },
      nintendo:       { label:"닌텐도 게임", folder:"nintendo" },
      etc:            { label:"기타",        folder:"etc" },
    };

    const DROPDOWNS = {
      pokemon: [
        { id:"gb",     label:"GB",     link:"pokemon/gb/index.html" },
        { id:"gba",    label:"GBA",    link:"pokemon/gba/index.html" },
        { id:"nds",    label:"NDS",    link:"pokemon/nds/index.html" },
        { id:"3ds",    label:"3DS",    link:"pokemon/3ds/index.html" },
        { id:"switch", label:"SWITCH", link:"pokemon/switch/index.html" },
        { id:"mobile", label:"모바일", link:"pokemon/mobile/index.html" },
        { id:"etc",    label:"기타",   link:"pokemon/etc/index.html" },
      ],
      animalcrossing: [
        { id:"64",          label:"동물의 숲 64",      link:"animalcrossing/64/index.html" },
        { id:"eplus",       label:"동물의숲+/e+",      link:"animalcrossing/eplus/index.html" },
        { id:"wildworld",   label:"놀러오세요",        link:"animalcrossing/wildworld/index.html" },
        { id:"cityfolk",    label:"타운으로 놀러가요", link:"animalcrossing/cityfolk/index.html" },
        { id:"newleaf",     label:"튀어나와요",        link:"animalcrossing/newleaf/index.html" },
        { id:"newhorizons", label:"모여봐요",          link:"animalcrossing/newhorizons/index.html" },
        { id:"etc",         label:"기타",              link:"animalcrossing/etc/index.html" },
      ],
      mario: [
        { id:"64", label:"64", link:"mario/64/index.html" },
        { id:"gb", label:"GB", link:"mario/gb/index.html" },
        { id:"gba",   label:"GBA",       link:"mario/gba/index.html" },
        { id:"nds",  label:"NDS",       link:"mario/nds/index.html" },
        { id:"wii", label:"Wii/U",     link:"mario/wii/index.html" },
        { id:"3ds", label:"3DS", link:"mario/3ds/index.html" },
        { id:"switch", label:"SWITCH", link:"mario/switch/index.html" },
        { id:"etc",    label:"기타",              link:"mario/etc/index.html" },
      ],
      zelda: [
        { id:"gb",     label:"GB",     link:"zelda/gb/index.html" },
        { id:"gba",    label:"GBA",    link:"zelda/gba/index.html" },
        { id:"nds",    label:"NDS",    link:"zelda/nds/index.html" },
        { id:"wii",    label:"Wii",    link:"zelda/wii/index.html" },
        { id:"3ds",    label:"3DS",    link:"zelda/3ds/index.html" },
        { id:"switch", label:"SWITCH", link:"zelda/switch/index.html" },
        { id:"etc",    label:"기타",   link:"zelda/etc/index.html" },
      ],
      kirby: [
        { id:"gb",     label:"GB",     link:"kirby/gb/index.html" },
        { id:"gba",    label:"GBA",    link:"kirby/gba/index.html" },
        { id:"nds",    label:"NDS",    link:"kirby/nds/index.html" },
        { id:"wii",    label:"Wii",    link:"kirby/wii/index.html" },
        { id:"3ds",    label:"3DS",    link:"kirby/3ds/index.html" },
        { id:"switch", label:"SWITCH", link:"kirby/switch/index.html" },
        { id:"etc",    label:"기타",   link:"kirby/etc/index.html" },
      ],
      nintendo: [
        { id:"classic", label:"패미컴/슈패미", link:"nintendo/classic/index.html" },
        { id:"n64gc",   label:"N64/게임큐브", link:"nintendo/n64gc/index.html" },
        { id:"gb",      label:"GB/GBA",       link:"nintendo/gb/index.html" },
        { id:"nds",     label:"NDS",          link:"nintendo/nds/index.html" },
        { id:"wii",     label:"Wii/Wii U",    link:"nintendo/wii/index.html" },
        { id:"3ds",     label:"3DS",          link:"nintendo/3ds/index.html" },
        { id:"switch",  label:"SWITCH",       link:"nintendo/switch/index.html" },
        { id:"mobile",  label:"모바일",       link:"nintendo/mobile/index.html" },
        { id:"etc",     label:"기타",         link:"nintendo/etc/index.html" },
      ],
      etc: [
        { id:"private",  label:"사설서버", link:"" },
        { id:"roulette", label:"룰렛",     link:"" },
        { id:"original", label:"창작 게임", link:"" },
        { id:"banpick",  label:"모의밴픽", link:"../loldraft.html" },
        { id:"contact",  label:"문의사항", link:"" },
      ],
    };

    /* ---------- 메인 슬라이드 이미지/링크 ---------- */
    const SLIDES = [
      { id: 1, image: "../images/slide1.jpg", link:  "#", label: "슬라이드 1" },
      { id: 2, image: "../images/slide2.jpg", link:  "#", label: "슬라이드 2" },
      { id: 3, image: "../images/slide3.jpg", link:  "#", label: "슬라이드 3" },
      { id: 4, image: "../images/slide4.jpg", link:  "#", label: "슬라이드 4" },
      { id: 5, image: "../images/slide5.jpg", link:  "#", label: "슬라이드 5" },
    ];

    function App(){
      const [openDropdown, setOpenDropdown] = useState(null);
      const [slideIndex, setSlideIndex] = useState(0);

      /* 자동 슬라이드 (5초마다 다음으로) */
      useEffect(() => {
        if (SLIDES.length <= 1) return;
        const timer = setInterval(() => {
          setSlideIndex(prev => (prev + 1) % SLIDES.length);
        }, 5000);
        return () => clearInterval(timer);
      }, []);

      const handleHome = () => {
        // 현재 페이지(동일 폴더의 index.html)로 이동
        window.location.href = "index.html";
      };

      const handleNavClick = (tabKey) => {
        setOpenDropdown(prev => prev === tabKey ? null : tabKey);
      };

      const handleDropdownItemClick = (item) => {
        setOpenDropdown(null);
        if (item.link) {
          window.location.href = item.link;
        } else {
          alert(`"${item.label}" 페이지는 아직 준비 중입니다.\n나중에 link만 채우면 돼.`);
        }
      };

      const handleExternalClick = (key) => {
        window.open(EXTERNAL_LINKS[key], "_blank", "noopener");
      };

      const showPrevSlide = () => {
        setSlideIndex(prev =>
          (prev - 1 + SLIDES.length) % SLIDES.length
        );
      };

      const showNextSlide = () => {
        setSlideIndex(prev =>
          (prev + 1) % SLIDES.length
        );
      };

      const handleSlideClick = () => {
        const slide = SLIDES[slideIndex];
        if (slide.link && slide.link !== "#") {
          window.location.href = slide.link;
        }
      };

      const currentSlide = SLIDES[slideIndex] || SLIDES[0];

      return (
        <div className="site-root">
          {/* 상단 헤더 */}
          <header className="global-header">
            <div className="header-inner">
              {/* 왼쪽 HOME */}
              <div className="header-left">
                <a href="index.html" className="home-logo">
                  <span>HWANG KYUWON</span>
                </a>
              </div>

              {/* 가운데 카테고리들 */}
              <nav className="header-center">
                {TAB_ORDER.map(tabKey => {
                  const info = TAB_INFO[tabKey];
                  const items = DROPDOWNS[tabKey] || [];
                  const isOpen = openDropdown === tabKey;
                  return (
                    <div
                      key={tabKey}
                      className={"nav-item" + (isOpen ? " open active" : "")}
                    >
                      <div className="nav-link-inner" onClick={() => handleNavClick(tabKey)}>
                        <div className="nav-icon-placeholder" />
                        <div className={"nav-label" + (isOpen ? " active" : "")}>
                          {info.label}
                        </div>
                      </div>

                      {items.length > 0 && (
                        <div className="dropdown">
                          {items.map(item => (
                            <button
                              key={item.id}
                              type="button"
                              className="dropdown-item"
                              onClick={() => handleDropdownItemClick(item)}
                            >
                              {item.label}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </nav>

              {/* 오른쪽 외부 링크 */}
              <div className="header-right">
                <a href={EXTERNAL_LINKS.youtube} target="_blank" rel="noopener noreferrer">
                  <img src={EXT_ICONS.youtube} alt="YouTube" className="ext-icon" />
                </a>
                <a href={EXTERNAL_LINKS.blog} target="_blank" rel="noopener noreferrer">
                  <img src={EXT_ICONS.blog} alt="Blog" className="ext-icon" />
                </a>
                <a href={EXTERNAL_LINKS.cafe} target="_blank" rel="noopener noreferrer">
                  <img src={EXT_ICONS.cafe} alt="Cafe" className="ext-icon" />
                </a>
              </div>
            </div>
          </header>

          {/* 아래 메인 : 풀스크린 슬라이드 */}
          <main className="main-wrap">
            <div className="slider-root">
              {/* 슬라이드 배경 이미지 */}
              <div
                className="slider-bg"
                style={{ backgroundImage:`url(${currentSlide.image})` }}
                onClick={handleSlideClick}
              />

              {/* 아래 그라디언트 바 + 이벤트/공지 배너 */}
              <div className="slider-gradient-bar" />
              <div className="slider-center-panel">
                <div className="event-banner">
                  <a
                    href={EVENT_NOTICE_LINKS.event}
                    className="event-link"
                  >
                    이벤트
                  </a>
                  <div className="event-dot" />
                  <a
                    href={EVENT_NOTICE_LINKS.notice}
                    className="event-link"
                  >
                    공지사항
                  </a>
                </div>
              </div>

              {/* 좌우 화살표 + 인디케이터 */}
              {SLIDES.length > 1 && (
                <>
                  <button
                    type="button"
                    className="slider-arrow left"
                    onClick={showPrevSlide}
                  >
                    ‹
                  </button>
                  <button
                    type="button"
                    className="slider-arrow right"
                    onClick={showNextSlide}
                  >
                    ›
                  </button>

                  <div className="slider-dots">
                    {SLIDES.map((s, idx) => (
                      <div
                        key={s.id}
                        className={
                          "slider-dot" + (idx === slideIndex ? " active" : "")
                        }
                      />
                    ))}
                  </div>
                </>
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
