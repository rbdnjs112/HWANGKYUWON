<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>사다리타기 (올랜덤)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #020617;
      border-radius: 16px;
      padding: 22px 24px 30px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
      border: 1px solid #1f2937;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 24px;
      text-align: center;
      color: #f9fafb;
    }
    .row {
      margin-bottom: 10px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }
    input::placeholder {
      color: #6b7280;
    }
    .btn-area {
      margin: 12px 0;
      text-align: center;
    }
    button {
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, #22c55e, #0ea5e9);
      color: #020617;
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.4);
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.2s;
    }
    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .ladder-wrapper {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: radial-gradient(circle at top, #111827 0, #020617 60%);
      border: 1px solid #1f2937;
    }
    .names-top, .names-bottom {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      color: #e5e7eb;
      margin-bottom: 4px;
    }
    .names-bottom {
      margin-top: 4px;
    }
    .names-top span,
    .names-bottom span {
      flex: 1;
      text-align: center;
    }
    .ladder-area {
      position: relative;
      height: 360px;
      margin: 8px 0;
    }
    .vertical-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #9ca3af;
      transform: translateX(-50%);
    }
    .horizontal-line {
      position: absolute;
      height: 2px;
      background: #f97316;
    }
    .result-table {
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      overflow: hidden;
      font-size: 13px;
    }
    .result-table-header,
    .result-row {
      display: flex;
    }
    .result-table-header {
      background: #111827;
      font-weight: 700;
    }
    .result-cell {
      flex: 1;
      padding: 6px 10px;
      border-right: 1px solid #1f2937;
      text-align: center;
      white-space: nowrap;
    }
    .result-row:nth-child(odd) {
      background: rgba(15, 23, 42, 0.9);
    }
    .result-row:nth-child(even) {
      background: rgba(31, 41, 55, 0.9);
    }
    .result-cell:last-child {
      border-right: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>사다리타기</h1>
    <div class="row">
      <label for="names">참가자 이름 (콤마로 구분)</label>
      <input id="names" type="text" placeholder="예) 철수, 영희, 민수, 지영">
    </div>
    <div class="row">
      <label for="results">결과 / 벌칙 / 상품 (콤마로 구분, 개수는 사람 수와 같게)</label>
      <input id="results" type="text" placeholder="예) 당첨, 꽝, 꽝, 꽝">
    </div>
    <div class="btn-area">
      <button id="makeLadderBtn">사다리 만들기</button>
    </div>

    <div class="ladder-wrapper">
      <div class="names-top" id="namesTop"></div>
      <div class="ladder-area" id="ladderArea"></div>
      <div class="names-bottom" id="namesBottom"></div>
    </div>

    <div id="resultBox"></div>
  </div>

  <script>
    const namesInput = document.getElementById('names');
    const resultsInput = document.getElementById('results');
    const makeLadderBtn = document.getElementById('makeLadderBtn');
    const namesTopEl = document.getElementById('namesTop');
    const namesBottomEl = document.getElementById('namesBottom');
    const ladderArea = document.getElementById('ladderArea');
    const resultBox = document.getElementById('resultBox');

    function createLadder() {
      const names = namesInput.value.split(',')
        .map(v => v.trim())
        .filter(v => v.length > 0);
      const results = resultsInput.value.split(',')
        .map(v => v.trim())
        .filter(v => v.length > 0);

      if (names.length < 2) {
        alert('참가자는 최소 2명 이상이어야 합니다.');
        return;
      }
      if (names.length !== results.length) {
        alert('참가자 수와 결과 수가 같아야 합니다.');
        return;
      }

      const n = names.length;
      const rows = 10;

      const hLines = [];
      for (let r = 0; r < rows; r++) {
        hLines[r] = [];
        for (let c = 0; c < n - 1; c++) {
          hLines[r][c] = false;
        }
      }

      // 옆줄과 바로 붙지 않게 랜덤 생성 → 참가자 전원에게 비슷한 확률
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < n - 1; c++) {
          if (c > 0 && hLines[r][c - 1]) {
            hLines[r][c] = false;
            continue;
          }
          if (Math.random() < 0.35) {
            hLines[r][c] = true;
          }
        }
      }

      namesTopEl.innerHTML = '';
      namesBottomEl.innerHTML = '';
      ladderArea.innerHTML = '';
      resultBox.innerHTML = '';

      // 위: 참가자 이름
      names.forEach(name => {
        const spanTop = document.createElement('span');
        spanTop.textContent = name;
        namesTopEl.appendChild(spanTop);
      });

      // 아래: 결과(상품/벌칙)를 고정 순서대로 표시
      results.forEach(res => {
        const spanBottom = document.createElement('span');
        spanBottom.textContent = res;
        namesBottomEl.appendChild(spanBottom);
      });

      const colPositions = [];
      if (n === 1) {
        colPositions.push(50);
      } else {
        for (let i = 0; i < n; i++) {
          colPositions.push((i / (n - 1)) * 100);
        }
      }

      colPositions.forEach(leftPercent => {
        const v = document.createElement('div');
        v.className = 'vertical-line';
        v.style.left = leftPercent + '%';
        ladderArea.appendChild(v);
      });

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < n - 1; c++) {
          if (!hLines[r][c]) continue;

          const h = document.createElement('div');
          h.className = 'horizontal-line';

          const topPercent = (r / (rows - 1)) * 100;
          const leftPercent = colPositions[c];
          const widthPercent = colPositions[c + 1] - colPositions[c];

          h.style.top = topPercent + '%';
          h.style.left = leftPercent + '%';
          h.style.width = widthPercent + '%';

          ladderArea.appendChild(h);
        }
      }

      // 각 참가자가 어떤 결과 열로 내려가는지 계산
      const finalIndexForStart = [];

      for (let start = 0; start < n; start++) {
        let pos = start;
        for (let r = 0; r < rows; r++) {
          if (pos < n - 1 && hLines[r][pos]) {
            pos = pos + 1;
          } else if (pos > 0 && hLines[r][pos - 1]) {
            pos = pos - 1;
          }
        }
        finalIndexForStart[start] = pos;
      }

      // 결과 표 (참가자 → 실제 도착 결과)
      const table = document.createElement('div');
      table.className = 'result-table';

      const header = document.createElement('div');
      header.className = 'result-table-header';
      const h1 = document.createElement('div');
      h1.className = 'result-cell';
      h1.textContent = '참가자';
      const h2 = document.createElement('div');
      h2.className = 'result-cell';
      h2.textContent = '결과';
      header.appendChild(h1);
      header.appendChild(h2);
      table.appendChild(header);

      for (let i = 0; i < n; i++) {
        const rowEl = document.createElement('div');
        rowEl.className = 'result-row';

        const c1 = document.createElement('div');
        c1.className = 'result-cell';
        c1.textContent = names[i];

        const c2 = document.createElement('div');
        c2.className = 'result-cell';
        const end = finalIndexForStart[i];
        c2.textContent = results[end]; // ★ 사다리 경로를 반영한 실제 결과

        rowEl.appendChild(c1);
        rowEl.appendChild(c2);
        table.appendChild(rowEl);
      }

      resultBox.appendChild(table);
    }

    makeLadderBtn.addEventListener('click', createLadder);
  </script>
</body>
</html>
