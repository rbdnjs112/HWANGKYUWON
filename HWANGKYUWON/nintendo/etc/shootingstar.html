<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Space Star Sports - 3min Match</title>
  <style>
    body {
      background: #000;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #wrapper {
      text-align: center;
    }
    canvas {
      border: 4px solid #444;
      background: #000011;
      display: block;
      margin: 0 auto 8px;
    }
    .info {
      font-size: 13px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <canvas id="game" width="800" height="500"></canvas>
    <div class="info">
      時間制限：3分（180秒） / YOU(白い宇宙服) vs AI(オレンジ宇宙服)<br />
      ↑↓←→：壁にぶつかった瞬間だけ進行方向変更 / Space, Shift：スピードアップ / R：リスタート
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const TOTAL_TIME = 180; // 180초 = 3분

    // 플레이어
    const player = {
      x: canvas.width * 0.25,
      y: canvas.height * 0.5,
      radius: 18,
      baseSpeed: 3.0,
      fastSpeed: 5.5,
      vx: 2.5,
      vy: -2.0,
      stars: 0,
      stunTimer: 0,
      pendingMeteorLoss: 0,
      respawnFreeDir: false,
      wallLock: false,     // 충돌 튕김 후 벽에 닿기 전까지 조작 불가
      lockedSpeed: null,
    };

    // AI (난이도 낮게)
    const enemy = {
      x: canvas.width * 0.75,
      y: canvas.height * 0.5,
      radius: 18,
      baseSpeed: 2.0,
      vx: -1.5,
      vy: 1.2,
      stars: 0,
      stunTimer: 0,
      pendingMeteorLoss: 0,
      respawnFreeDir: false,
      wallLock: false,
      lockedSpeed: null,
    };

    // 키 상태
    const pressed = {
      ArrowUp: false,
      ArrowDown: false,
      ArrowLeft: false,
      ArrowRight: false,
      Space: false,
      ShiftLeft: false,
      ShiftRight: false,
      KeyR: false,
    };

    // 별들 / 유성 / 블랙홀
    let stars = [];
    let meteors = [];
    let meteorsActive = false;
    let meteorSpawnTimer = 0;

    let blackHoleActive = false;
    let blackHole = null;
    let blackHoleAngle = 0; // 소용돌이 회전 각도

    let gravityAnomaly = false;

    let elapsedTime = 0; // 누적 시간(초)
    let lastTime = 0;
    let deltaTime = 0;

    let gameOver = false;
    let winnerMessage = "";

    function spawnStar() {
      const margin = 40;
      const x = margin + Math.random() * (canvas.width - margin * 2);
      const y = margin + Math.random() * (canvas.height - margin * 2);
      return { x, y, radius: 12 };
    }

    function resetGame() {
      player.x = canvas.width * 0.25;
      player.y = canvas.height * 0.5;
      player.vx = 2.5;
      player.vy = -2.0;
      player.stars = 0;
      player.stunTimer = 0;
      player.pendingMeteorLoss = 0;
      player.respawnFreeDir = false;
      player.wallLock = false;
      player.lockedSpeed = null;

      enemy.x = canvas.width * 0.75;
      enemy.y = canvas.height * 0.5;
      enemy.vx = -1.5;
      enemy.vy = 1.2;
      enemy.stars = 0;
      enemy.stunTimer = 0;
      enemy.pendingMeteorLoss = 0;
      enemy.respawnFreeDir = false;
      enemy.wallLock = false;
      enemy.lockedSpeed = null;

      stars = [];
      for (let i = 0; i < 5; i++) {
        stars.push(spawnStar());
      }

      meteors = [];
      meteorsActive = false;
      meteorSpawnTimer = 0;

      blackHoleActive = false;
      blackHole = null;
      blackHoleAngle = 0;

      gravityAnomaly = false;
      elapsedTime = 0;
      gameOver = false;
      winnerMessage = "";
      lastTime = 0;
      deltaTime = 0;
    }

    resetGame();

    window.addEventListener("keydown", (e) => {
      if (e.code in pressed) {
        pressed[e.code] = true;
        e.preventDefault();
      }
      if (e.code === "KeyR" && gameOver) {
        resetGame();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code in pressed) {
        pressed[e.code] = false;
        e.preventDefault();
      }
    });

    function getInputDirection() {
      let dx = 0;
      let dy = 0;
      if (pressed.ArrowLeft) dx -= 1;
      if (pressed.ArrowRight) dx += 1;
      if (pressed.ArrowUp) dy -= 1;
      if (pressed.ArrowDown) dy += 1;

      if (dx === 0 && dy === 0) return null;
      const len = Math.hypot(dx, dy);
      return { dx: dx / len, dy: dy / len };
    }

    function currentPlayerSpeed() {
      // 충돌 튕김 락 상태에서는 Space/Shift 무시, 고정 속도 유지
      if (player.wallLock && player.lockedSpeed != null) {
        return player.lockedSpeed;
      }
      if (pressed.Space || pressed.ShiftLeft || pressed.ShiftRight) {
        return player.fastSpeed;
      }
      return player.baseSpeed;
    }

    // 우주인 그리기
    function drawAstronaut(x, y, size, colorType = "player") {
      ctx.save();
      ctx.translate(x, y);

      const bodyWidth = size * 1.0;
      const bodyHeight = size * 1.6;
      const helmetRadius = size * 0.7;

      const suitColor = colorType === "player" ? "#e5e7eb" : "#fed7aa";
      const borderColor = colorType === "player" ? "#9ca3af" : "#ea580c";

      // 몸통
      ctx.fillStyle = suitColor;
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      const bodyX = -bodyWidth / 2;
      const bodyY = -bodyHeight / 2 + helmetRadius * 0.3;
      ctx.beginPath();
      ctx.rect(bodyX, bodyY, bodyWidth, bodyHeight);
      ctx.fill();
      ctx.stroke();

      // 헬멧
      ctx.beginPath();
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 2;
      ctx.arc(0, -bodyHeight / 2, helmetRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // 헬멧 유리창
      ctx.beginPath();
      ctx.fillStyle = "#111827";
      ctx.arc(0, -bodyHeight / 2, helmetRadius * 0.75, 0, Math.PI * 2);
      ctx.fill();

      // 팔
      ctx.strokeStyle = suitColor;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(bodyX, bodyY + bodyHeight * 0.1);
      ctx.lineTo(bodyX - bodyWidth * 0.5, bodyY + bodyHeight * 0.4);
      ctx.moveTo(bodyX + bodyWidth, bodyY + bodyHeight * 0.1);
      ctx.lineTo(bodyX + bodyWidth + bodyWidth * 0.5, bodyY + bodyHeight * 0.4);
      ctx.stroke();

      // 다리
      ctx.beginPath();
      const legY = bodyY + bodyHeight;
      ctx.moveTo(-bodyWidth * 0.25, legY);
      ctx.lineTo(-bodyWidth * 0.25, legY + bodyHeight * 0.4);
      ctx.moveTo(bodyWidth * 0.25, legY);
      ctx.lineTo(bodyWidth * 0.25, legY + bodyHeight * 0.4);
      ctx.stroke();

      // 가슴 패널
      ctx.fillStyle = "#020617";
      ctx.strokeStyle = "#020617";
      const panelWidth = bodyWidth * 0.5;
      const panelHeight = bodyHeight * 0.3;
      const panelX = -panelWidth / 2;
      const panelY = bodyY + bodyHeight * 0.15;
      ctx.beginPath();
      ctx.rect(panelX, panelY, panelWidth, panelHeight);
      ctx.fill();
      ctx.stroke();

      // 패널 버튼
      ctx.fillStyle = colorType === "player" ? "#22c55e" : "#fb923c";
      ctx.beginPath();
      ctx.arc(panelX + panelWidth * 0.3, panelY + panelHeight * 0.5, size * 0.11, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = colorType === "player" ? "#3b82f6" : "#ef4444";
      ctx.beginPath();
      ctx.arc(panelX + panelWidth * 0.7, panelY + panelHeight * 0.5, size * 0.11, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // 노란 별(★) 그리기
    function drawStarShape(cx, cy, outerRadius, innerRadius, spikes = 5) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      const step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
    }

    // 중력 이상: 매 프레임 살짝 방향이 휘도록
    function applyGravityAnomalyTo(obj) {
      const angle = (Math.random() - 0.5) * 0.1; // -0.05 ~ +0.05 rad
      const cosA = Math.cos(angle);
      const sinA = Math.sin(angle);
      const vx = obj.vx * cosA - obj.vy * sinA;
      const vy = obj.vx * sinA + obj.vy * cosA;
      obj.vx = vx;
      obj.vy = vy;
    }

    // 벽 타기 방지용 방향 보정
    function adjustDirectionAwayFromWall(dir, hitVertical, hitHorizontal) {
      if (!dir) return null;
      let dx = dir.dx;
      let dy = dir.dy;
      const MIN_COMPONENT = 0.35;

      if (hitVertical) {
        if (Math.abs(dx) < MIN_COMPONENT) {
          dx = dx >= 0 ? MIN_COMPONENT : -MIN_COMPONENT;
        }
      }
      if (hitHorizontal) {
        if (Math.abs(dy) < MIN_COMPONENT) {
          dy = dy >= 0 ? MIN_COMPONENT : -MIN_COMPONENT;
        }
      }
      const len = Math.hypot(dx, dy) || 1;
      return { dx: dx / len, dy: dy / len };
    }

    // 플레이어 업데이트
    function updatePlayer() {
      // 기절 중이면 이동 불가, 기절 끝나면 별 토해내기
      if (player.stunTimer > 0) {
        player.stunTimer -= deltaTime;
        if (player.stunTimer <= 0) {
          player.stunTimer = 0;
          if (player.pendingMeteorLoss > 0) {
            const lost = Math.min(player.stars, player.pendingMeteorLoss);
            player.stars -= lost;
            player.pendingMeteorLoss = 0;
            for (let i = 0; i < lost; i++) {
              stars.push(spawnStar());
            }
          }
        }
        return;
      }

      // 블랙홀 리스폰 직후 또는 완전 정지 상태에서
      // 방향키를 누르면 그 방향으로 출발
      if (
        !player.wallLock &&
        (player.respawnFreeDir ||
          (Math.abs(player.vx) < 0.0001 && Math.abs(player.vy) < 0.0001))
      ) {
        const dir = getInputDirection();
        if (dir) {
          const spd = currentPlayerSpeed();
          player.vx = dir.dx * spd;
          player.vy = dir.dy * spd;
          player.respawnFreeDir = false;
        }
      }

      const currentMag = Math.hypot(player.vx, player.vy);
      const desiredSpeed = currentPlayerSpeed();
      if (currentMag > 0 && Math.abs(currentMag - desiredSpeed) > 0.01) {
        player.vx = (player.vx / currentMag) * desiredSpeed;
        player.vy = (player.vy / currentMag) * desiredSpeed;
      }

      player.x += player.vx;
      player.y += player.vy;

      let hitVertical = false;
      let hitHorizontal = false;

      if (player.x - player.radius < 0) {
        player.x = player.radius;
        hitVertical = true;
      }
      if (player.x + player.radius > canvas.width) {
        player.x = canvas.width - player.radius;
        hitVertical = true;
      }
      if (player.y - player.radius < 0) {
        player.y = player.radius;
        hitHorizontal = true;
      }
      if (player.y + player.radius > canvas.height) {
        player.y = canvas.height - player.radius;
        hitHorizontal = true;
      }

      if (hitVertical || hitHorizontal) {
        const spd = currentPlayerSpeed();

        if (hitVertical) player.vx *= -1;
        if (hitHorizontal) player.vy *= -1;

        if (!player.wallLock) {
          // 평소: 벽에 닿은 순간에만 방향 입력 허용
          const rawDir = getInputDirection();
          const dir = adjustDirectionAwayFromWall(
            rawDir,
            hitVertical,
            hitHorizontal
          );
          if (dir) {
            player.vx = dir.dx * spd;
            player.vy = dir.dy * spd;
          } else {
            const mag = Math.hypot(player.vx, player.vy) || 1;
            player.vx = (player.vx / mag) * spd;
            player.vy = (player.vy / mag) * spd;
          }
        } else {
          // 충돌 후 첫 벽: 단순 반사 + 속도 유지 후 락 해제
          const mag = Math.hypot(player.vx, player.vy) || 1;
          player.vx = (player.vx / mag) * spd;
          player.vy = (player.vy / mag) * spd;
          player.wallLock = false;
          player.lockedSpeed = null;
        }
      }

      if (gravityAnomaly) {
        applyGravityAnomalyTo(player);
      }
    }

    // 별이 없을 때는 방향 유지
    function setEnemyDirectionToNearestStar() {
      if (stars.length === 0) {
        return;
      }
      let bestIndex = 0;
      let bestDist = Infinity;
      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        const dx = s.x - enemy.x;
        const dy = s.y - enemy.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestDist) {
          bestDist = d2;
          bestIndex = i;
        }
      }
      const target = stars[bestIndex];
      const dx = target.x - enemy.x;
      const dy = target.y - enemy.y;
      const len = Math.hypot(dx, dy) || 1;
      enemy.vx = (dx / len) * enemy.baseSpeed;
      enemy.vy = (dy / len) * enemy.baseSpeed;
    }

    function updateEnemy() {
      // 기절 중이면 이동 불가, 끝나면 별 토해내기
      if (enemy.stunTimer > 0) {
        enemy.stunTimer -= deltaTime;
        if (enemy.stunTimer <= 0) {
          enemy.stunTimer = 0;
          if (enemy.pendingMeteorLoss > 0) {
            const lost = Math.min(enemy.stars, enemy.pendingMeteorLoss);
            enemy.stars -= lost;
            enemy.pendingMeteorLoss = 0;
            for (let i = 0; i < lost; i++) {
              stars.push(spawnStar());
            }
          }
        }
        return;
      }

      // 블랙홀 리스폰 후 1회 방향 설정 (충돌 락 아닐 때만)
      if (!enemy.wallLock && enemy.respawnFreeDir) {
        setEnemyDirectionToNearestStar();
        enemy.respawnFreeDir = false;
      }

      enemy.x += enemy.vx;
      enemy.y += enemy.vy;

      let hitVertical = false;
      let hitHorizontal = false;

      if (enemy.x - enemy.radius < 0) {
        enemy.x = enemy.radius;
        hitVertical = true;
      }
      if (enemy.x + enemy.radius > canvas.width) {
        enemy.x = canvas.width - enemy.radius;
        hitVertical = true;
      }
      if (enemy.y - enemy.radius < 0) {
        enemy.y = enemy.radius;
        hitHorizontal = true;
      }
      if (enemy.y + enemy.radius > canvas.height) {
        enemy.y = canvas.height - enemy.radius;
        hitHorizontal = true;
      }

      if (hitVertical || hitHorizontal) {
        if (enemy.wallLock) {
          // 충돌 튕김 상태: 단순 반사 후 락 해제
          if (hitVertical) enemy.vx *= -1;
          if (hitHorizontal) enemy.vy *= -1;

          const spd =
            enemy.lockedSpeed != null ? enemy.lockedSpeed : enemy.baseSpeed;
          const mag = Math.hypot(enemy.vx, enemy.vy) || 1;
          enemy.vx = (enemy.vx / mag) * spd;
          enemy.vy = (enemy.vy / mag) * spd;

          enemy.wallLock = false;
          enemy.lockedSpeed = null;
        } else {
          // 평소에는 별 쪽으로 방향 재조정
          setEnemyDirectionToNearestStar();
        }
      }

      if (gravityAnomaly) {
        applyGravityAnomalyTo(enemy);
      }
    }

    // 유성 생성
    function spawnMeteor() {
      const side = Math.floor(Math.random() * 4);
      const speed = 3 + Math.random() * 2;
      let x, y, vx, vy;

      if (side === 0) {
        x = -20;
        y = Math.random() * canvas.height;
        vx = speed;
        vy = (Math.random() - 0.5) * 2;
      } else if (side === 1) {
        x = canvas.width + 20;
        y = Math.random() * canvas.height;
        vx = -speed;
        vy = (Math.random() - 0.5) * 2;
      } else if (side === 2) {
        x = Math.random() * canvas.width;
        y = -20;
        vx = (Math.random() - 0.5) * 2;
        vy = speed;
      } else {
        x = Math.random() * canvas.width;
        y = canvas.height + 20;
        vx = (Math.random() - 0.5) * 2;
        vy = -speed;
      }

      meteors.push({ x, y, vx, vy, radius: 10 });
    }

    function updateMeteors() {
      for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        m.x += m.vx;
        m.y += m.vy;

        if (
          m.x < -50 || m.x > canvas.width + 50 ||
          m.y < -50 || m.y > canvas.height + 50
        ) {
          meteors.splice(i, 1);
        }
      }
    }

    // 유성 맞으면: 1초 기절 + 기절 끝날 때 별 절반 토해내기(랜덤 위치)
    function applyMeteorHit(target) {
      if (target.stunTimer > 0) return;

      target.stunTimer = 1.0;

      if (target.stars > 0) {
        let lost = Math.floor(target.stars / 2);
        if (lost < 1) lost = 1;
        target.pendingMeteorLoss = lost;
      } else {
        target.pendingMeteorLoss = 0;
      }
    }

    function checkMeteorCollisions() {
      for (const m of meteors) {
        const dP = Math.hypot(player.x - m.x, player.y - m.y);
        if (dP < player.radius + m.radius && player.stunTimer <= 0) {
          applyMeteorHit(player);
        }
        const dE = Math.hypot(enemy.x - m.x, enemy.y - m.y);
        if (dE < enemy.radius + m.radius && enemy.stunTimer <= 0) {
          applyMeteorHit(enemy);
        }
      }
    }

    function spawnBlackHole() {
      const margin = 80;
      const x = margin + Math.random() * (canvas.width - margin * 2);
      const y = margin + Math.random() * (canvas.height - margin * 2);
      return { x, y, radius: 30 };
    }

    // 블랙홀에 빨려들면: 별 전부 잃고, 필드 정가운데에서 리스폰 + 1회 자유 방향 설정
    function handleBlackHoleFor(target) {
      if (!blackHoleActive || !blackHole) return;
      const d = Math.hypot(target.x - blackHole.x, target.y - blackHole.y);
      if (d < target.radius + blackHole.radius) {
        if (target.stars > 0) {
          const lost = target.stars;
          target.stars = 0;
          for (let i = 0; i < lost; i++) {
            stars.push(spawnStar());
          }
        }
        // 정가운데 리스폰
        target.x = canvas.width / 2;
        target.y = canvas.height / 2;
        target.vx = 0;
        target.vy = 0;

        // 블랙홀에서 나온 직후 1회 자유 방향
        target.respawnFreeDir = true;
        target.wallLock = false;
        target.lockedSpeed = null;
      }
    }

    // 플레이어 ↔ AI 충돌 시 튕기기 (공격자 vs 피격자)
    function handlePlayerEnemyCollision() {
      const dx = enemy.x - player.x;
      const dy = enemy.y - player.y;
      const dist = Math.hypot(dx, dy);
      const minDist = player.radius + enemy.radius;

      // 너무 멀면 충돌 아님
      if (dist > minDist) return;

      // 완전히 같은 위치에 겹쳤을 때 안전 처리
      if (dist === 0) {
        player.x -= 1;
        enemy.x += 1;
        return;
      }

      // 겹친 만큼 서로 반씩 밀어내기
      const overlap = minDist - dist;
      const nx = dx / dist;
      const ny = dy / dist;

      player.x -= nx * overlap / 2;
      player.y -= ny * overlap / 2;
      enemy.x += nx * overlap / 2;
      enemy.y += ny * overlap / 2;

      // 충돌 직전 속도와 방향 벡터 기록
      const pSpeedBefore = Math.hypot(player.vx, player.vy) || 1;
      const eSpeedBefore = Math.hypot(enemy.vx, enemy.vy) || 1;

      const pDirX = player.vx / pSpeedBefore;
      const pDirY = player.vy / pSpeedBefore;
      const eDirX = enemy.vx / eSpeedBefore;
      const eDirY = enemy.vy / eSpeedBefore;

      // 더 빠르게 달리던 쪽을 "공격자", 다른 쪽을 "피격자"로 설정
      let attacker, victim;
      let attackerIsPlayer = false;

      if (pSpeedBefore >= eSpeedBefore) {
        attacker = player;
        victim = enemy;
        attackerIsPlayer = true;
      } else {
        attacker = enemy;
        victim = player;
        attackerIsPlayer = false;
      }

      // 스페이스/시프트를 누르고 있을 때는 둘 다 더 빠르게 튕기기
      const spaceBoostActive =
        pressed.Space || pressed.ShiftLeft || pressed.ShiftRight;
      const bounceFactor = spaceBoostActive ? 1.8 : 1.0;

      // 기본 속도 기준으로 튕김 속도 결정
      const pBase = player.baseSpeed;
      const eBase = enemy.baseSpeed;

      let attackerSpeed = (attacker === player ? pBase : eBase) * bounceFactor;
      let victimSpeed   = (victim   === player ? pBase : eBase) * bounceFactor;

      // 공격자 → 피격자의 "원래 가던 방향"으로 튕기기
      // 피격자 → 자신의 "원래 가던 방향의 반대"로 튕기기
      if (attackerIsPlayer) {
        // 공격자: player, 피격자: enemy
        player.vx = eDirX * attackerSpeed;
        player.vy = eDirY * attackerSpeed;

        enemy.vx = -eDirX * victimSpeed;
        enemy.vy = -eDirY * victimSpeed;
      } else {
        // 공격자: enemy, 피격자: player
        enemy.vx = pDirX * attackerSpeed;
        enemy.vy = pDirY * attackerSpeed;

        player.vx = -pDirX * victimSpeed;
        player.vy = -pDirY * victimSpeed;
      }

      // 이제부터 둘 다 벽에 닿을 때까지 조작/속도 변경 불가
      player.wallLock = true;
      player.lockedSpeed = (player === victim) ? victimSpeed : attackerSpeed;

      enemy.wallLock = true;
      enemy.lockedSpeed = (enemy === victim) ? victimSpeed : attackerSpeed;
    }

    // 별 먹기
    function handleStarPickups() {
      for (let i = stars.length - 1; i >= 0; i--) {
        const s = stars[i];
        let pickedBy = null;
        let dP = Infinity;
        let dE = Infinity;

        if (player.stunTimer <= 0) {
          dP = Math.hypot(player.x - s.x, player.y - s.y);
          if (dP < player.radius + s.radius) pickedBy = "player";
        }

        if (enemy.stunTimer <= 0) {
          dE = Math.hypot(enemy.x - s.x, enemy.y - s.y);
          if (dE < enemy.radius + s.radius) {
            if (!pickedBy) {
              pickedBy = "enemy";
            } else {
              if (dP <= dE + 5) {
                pickedBy = "player";
              } else {
                pickedBy = "enemy";
              }
            }
          }
        }

        if (pickedBy === "player") {
          player.stars += 1;
          stars.splice(i, 1);
        } else if (pickedBy === "enemy") {
          enemy.stars += 1;
          stars.splice(i, 1);
        }
      }

      if (stars.length === 0) {
        stars.push(spawnStar());
      }
    }

    function updateGameLogic() {
      if (gameOver) return;

      if (lastTime !== 0) {
        elapsedTime += deltaTime;
      }

      if (elapsedTime >= TOTAL_TIME) {
        elapsedTime = TOTAL_TIME;
        gameOver = true;
        if (player.stars > enemy.stars) {
          winnerMessage = "YOU WIN!";
        } else if (player.stars < enemy.stars) {
          winnerMessage = "AI WINS!";
        } else {
          winnerMessage = "DRAW";
        }
        return;
      }

      if (elapsedTime >= 60 && !meteorsActive) {
        meteorsActive = true;
        meteorSpawnTimer = 1.5;
      }
      if (elapsedTime >= 120 && !blackHoleActive) {
        blackHoleActive = true;
        blackHole = spawnBlackHole();
      }

      gravityAnomaly = stars.length >= 10;

      if (meteorsActive) {
        meteorSpawnTimer -= deltaTime;
        if (meteorSpawnTimer <= 0) {
          spawnMeteor();
          meteorSpawnTimer = 3 + Math.random() * 2;
        }
      }

      if (blackHoleActive) {
        blackHoleAngle += deltaTime * 1.2; // 블랙홀 회전 속도
      }

      updatePlayer();
      updateEnemy();

      if (meteorsActive) {
        updateMeteors();
        checkMeteorCollisions();
      }

      if (blackHoleActive) {
        handleBlackHoleFor(player);
        handleBlackHoleFor(enemy);
      }

      // 플레이어 vs AI 충돌 처리 (튕김)
      handlePlayerEnemyCollision();

      handleStarPickups();
    }

    function drawBackgroundStars() {
      for (let i = 0; i < 40; i++) {
        const x = (i * 71) % canvas.width;
        const y = (i * 131) % canvas.height;
        ctx.fillStyle = i % 2 === 0 ? "rgba(255,255,255,0.3)" : "rgba(180,220,255,0.25)";
        ctx.fillRect(x, y, 2, 2);
      }
    }

    // 회전하는 소용돌이 블랙홀
    function drawBlackHole(bh) {
      ctx.save();
      ctx.translate(bh.x, bh.y);
      ctx.rotate(blackHoleAngle);

      // 바깥쪽 희미한 링
      for (let i = 0; i < 4; i++) {
        const r = bh.radius + 8 - i * 4;
        const start = i * 0.7;
        const end = start + Math.PI * 1.8;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(15,23,42,${0.25 + 0.15 * i})`;
        ctx.lineWidth = 5 - i;
        ctx.arc(0, 0, r, start, end);
        ctx.stroke();
      }

      // 안쪽 소용돌이 암
      for (let i = 0; i < 3; i++) {
        const r = bh.radius - i * 5;
        const start = blackHoleAngle * (1 + i * 0.4);
        const end = start + Math.PI * 1.3;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(30,64,175,${0.4 - 0.1 * i})`;
        ctx.lineWidth = 3 - i * 0.7;
        ctx.arc(0, 0, r, start, end);
        ctx.stroke();
      }

      // 중앙 코어
      ctx.beginPath();
      ctx.fillStyle = "#000000";
      ctx.arc(0, 0, bh.radius * 0.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // 유성: 머리 + 긴 꼬리 + 양쪽으로 갈라지는 불빛 스트릭
    function drawMeteor(m) {
      ctx.save();
      ctx.translate(m.x, m.y);

      const angle = Math.atan2(m.vy, m.vx);
      ctx.rotate(angle);

      const tailLength = 60;
      const halfHeight = 7;

      const grad = ctx.createLinearGradient(0, 0, -tailLength, 0);
      grad.addColorStop(0, "rgba(255,248,240,1)");
      grad.addColorStop(0.3, "rgba(253,186,116,0.95)");
      grad.addColorStop(1, "rgba(248,250,252,0)");

      ctx.beginPath();
      ctx.fillStyle = grad;
      ctx.moveTo(0, -halfHeight);
      ctx.lineTo(-tailLength, -halfHeight * 0.2);
      ctx.lineTo(-tailLength, halfHeight * 0.2);
      ctx.lineTo(0, halfHeight);
      ctx.closePath();
      ctx.fill();

      for (let i = 0; i < 3; i++) {
        const offset = 10 + i * 12;
        const alpha = 0.8 - i * 0.25;

        ctx.beginPath();
        ctx.strokeStyle = `rgba(251,191,36,${alpha})`;
        ctx.lineWidth = 2 - i * 0.4;
        ctx.moveTo(-offset, -halfHeight * 0.6);
        ctx.lineTo(-offset - 14, -halfHeight * 0.1);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-offset, halfHeight * 0.6);
        ctx.lineTo(-offset - 14, halfHeight * 0.1);
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.fillStyle = "#fed7aa";
      ctx.arc(0, 0, m.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.arc(-m.radius * 0.3, -m.radius * 0.3, m.radius * 0.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function draw() {
      ctx.fillStyle = "#000011";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawBackgroundStars();

      ctx.strokeStyle = "#444";
      ctx.lineWidth = 4;
      ctx.strokeRect(0, 0, canvas.width, canvas.height);

      for (const s of stars) {
        ctx.save();
        ctx.shadowColor = "#facc15";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#ffd93b";
        drawStarShape(s.x, s.y, s.radius, s.radius * 0.5, 5);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
      }

      if (blackHoleActive && blackHole) {
        drawBlackHole(blackHole);
      }

      if (meteorsActive) {
        for (const m of meteors) {
          drawMeteor(m);
        }
      }

      drawAstronaut(enemy.x, enemy.y, enemy.radius, "enemy");
      drawAstronaut(player.x, player.y, player.radius, "player");

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "left";
      ctx.font = "19px system-ui, sans-serif";
      ctx.fillText(`YOU: ${player.stars}`, 10, 26);
      ctx.fillText(`AI : ${enemy.stars}`, 10, 50);

      const remaining = Math.max(0, TOTAL_TIME - elapsedTime);
      const sec = Math.floor(remaining);
      const min = Math.floor(sec / 60);
      const sec2 = sec % 60;
      const timeStr = `${min}:${sec2.toString().padStart(2, "0")}`;

      ctx.textAlign = "center";
      ctx.font = "22px system-ui, sans-serif";
      ctx.fillText(`Time: ${timeStr}`, canvas.width / 2, 28);

      ctx.font = "14px system-ui, sans-serif";
      let phase = "Phase 1: Normal";
      if (elapsedTime >= 120) {
        phase = "Phase 3: Black Hole + Meteors";
      } else if (elapsedTime >= 60) {
        phase = "Phase 2: Meteors";
      }
      if (gravityAnomaly) {
        phase += " / Gravity Anomaly!";
      }
      ctx.fillText(phase, canvas.width / 2, 50);

      ctx.textAlign = "left";
      ctx.font = "13px system-ui, sans-serif";
      ctx.fillText("↑↓←→ : 壁にぶつかった瞬間だけ方向変更 / Space・Shift : スピード調整", 10, canvas.height - 30);
      ctx.fillText("流星：1秒気絶後、星の半分をランダムにばらまく / ブラックホール：所持星全ロスト＋中央リスポーン", 10, canvas.height - 12);

      if (gameOver) {
        ctx.fillStyle = "#ffffff";
        ctx.font = "48px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(winnerMessage, canvas.width / 2, canvas.height / 2 - 10);

        ctx.font = "20px system-ui, sans-serif";
        ctx.fillText("Press R to Restart", canvas.width / 2, canvas.height / 2 + 30);
        ctx.textAlign = "left";
      }
    }

    function loop(timestamp) {
      if (!lastTime) {
        lastTime = timestamp;
        deltaTime = 0;
      } else {
        deltaTime = (timestamp - lastTime) / 1000;
        if (deltaTime > 0.2) deltaTime = 0.2;
        lastTime = timestamp;
      }

      updateGameLogic();
      draw();

      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
