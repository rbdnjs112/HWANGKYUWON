<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>랜덤 숫자 뽑기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1120;
      color: #e5e7eb;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #020617;
      border-radius: 18px;
      padding: 24px 24px 30px;
      border: 1px solid #1f2937;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      text-align: center;
      color: #f9fafb;
    }
    .desc {
      font-size: 13px;
      text-align: center;
      color: #9ca3af;
      margin-bottom: 12px;
    }
    .row {
      margin-bottom: 10px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    input[type="number"] {
      width: 160px;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      text-align: right;
    }
    .btn-area {
      margin-top: 10px;
      text-align: center;
    }
    button {
      padding: 8px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: #020617;
      box-shadow: 0 4px 14px rgba(168, 85, 247, 0.4);
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.2s;
    }
    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .result {
      margin-top: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      min-height: 28px;
    }
    .result span {
      padding: 6px 16px;
      border-radius: 999px;
      background: #22c55e;
      color: #020617;
    }
    .history {
      margin-top: 14px;
      font-size: 12px;
      color: #9ca3af;
    }
    .history strong {
      color: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>랜덤 숫자 뽑기</h1>
    <div class="desc">
      최대 숫자를 입력하면 1부터 그 숫자 사이에서 하나를 랜덤으로 뽑아요.
    </div>

    <div class="row">
      <label for="maxNumber">최대 숫자</label>
      <input id="maxNumber" type="number" min="1" value="493">
    </div>

    <div class="btn-area">
      <button id="drawBtn">숫자 뽑기</button>
    </div>

    <div class="result" id="resultBox"></div>
    <div class="history" id="historyBox"></div>
  </div>

  <script>
    const maxNumberInput = document.getElementById('maxNumber');
    const drawBtn = document.getElementById('drawBtn');
    const resultBox = document.getElementById('resultBox');
    const historyBox = document.getElementById('historyBox');

    const history = []; // 뽑힌 숫자 기록 (최근 몇 개만 보여줌)

    function drawRandomNumber() {
      let max = parseInt(maxNumberInput.value, 10);

      if (isNaN(max) || max < 1) {
        alert('1 이상의 숫자를 입력해 주세요.');
        return;
      }

      // 1 ~ max 사이의 정수 중 하나를 균등확률로 뽑기
      const rnd = Math.floor(Math.random() * max) + 1;

      resultBox.innerHTML = `<span>${rnd}</span>`;

      history.unshift(rnd);
      if (history.length > 10) history.pop();

      historyBox.innerHTML = history.length
        ? `<strong>최근 뽑힌 숫자:</strong> ${history.join(', ')}`
        : '';
    }

    drawBtn.addEventListener('click', drawRandomNumber);
  </script>
</body>
</html>
