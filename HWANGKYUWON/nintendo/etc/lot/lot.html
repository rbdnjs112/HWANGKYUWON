<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>제비뽑기 (올랜덤)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1120;
      color: #e5e7eb;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #020617;
      border-radius: 18px;
      padding: 24px 24px 30px;
      border: 1px solid #1f2937;
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      text-align: center;
      color: #f9fafb;
    }
    .row {
      margin-bottom: 10px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 4px;
    }
    input[type="number"] {
      width: 120px;
      padding: 6px 8px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      text-align: right;
    }
    .btn-area {
      margin-top: 8px;
      text-align: center;
    }
    button.main {
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      color: #020617;
      box-shadow: 0 4px 14px rgba(168, 85, 247, 0.4);
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.2s;
    }
    button.main:active {
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .tickets {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .ticket-btn {
      min-width: 70px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.08s ease, box-shadow 0.08s ease;
    }
    .ticket-btn.revealed-win {
      background: #22c55e;
      color: #020617;
      font-weight: 700;
      box-shadow: 0 0 14px rgba(34, 197, 94, 0.8);
      border-color: #4ade80;
    }
    .ticket-btn.revealed-lose {
      background: #374151;
      color: #e5e7eb;
      opacity: 0.8;
    }
    .ticket-btn:disabled {
      cursor: default;
      transform: none;
    }
    .ticket-btn:not(:disabled):hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .result {
      margin-top: 16px;
      text-align: center;
      min-height: 24px;
      font-size: 18px;
      font-weight: 700;
    }
    .result span {
      padding: 4px 10px;
      border-radius: 999px;
    }
    .result span.win {
      background: #22c55e;
      color: #020617;
    }
    .result span.lose {
      background: #6b7280;
      color: #020617;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>제비뽑기</h1>
    <div class="row">
      <label for="count">제비 개수</label>
      <input id="count" type="number" min="2" max="50" value="6">
    </div>
    <div class="btn-area">
      <button class="main" id="makeTicketsBtn">제비 만들기</button>
    </div>

    <div class="tickets" id="tickets"></div>
    <div class="result" id="lotResult"></div>
  </div>

  <script>
    const countInput = document.getElementById('count');
    const makeTicketsBtn = document.getElementById('makeTicketsBtn');
    const ticketsEl = document.getElementById('tickets');
    const lotResult = document.getElementById('lotResult');

    let tickets = []; // 'win' 또는 'lose'
    let revealedWin = false;

    function makeTickets() {
      let count = parseInt(countInput.value, 10);
      if (isNaN(count) || count < 2) {
        alert('제비 개수는 최소 2개 이상이어야 합니다.');
        return;
      }
      if (count > 50) {
        alert('너무 많은 제비는 피해주세요. (최대 50개)');
        return;
      }

      tickets = new Array(count).fill('lose');
      const winIndex = Math.floor(Math.random() * count); // ★ 완전 균등 랜덤
      tickets[winIndex] = 'win';
      revealedWin = false;

      ticketsEl.innerHTML = '';
      lotResult.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const btn = document.createElement('button');
        btn.className = 'ticket-btn';
        btn.textContent = '제비 ' + (i + 1);
        btn.dataset.index = i;
        btn.addEventListener('click', onTicketClick);
        ticketsEl.appendChild(btn);
      }
    }

    function onTicketClick(e) {
      const btn = e.currentTarget;
      const idx = parseInt(btn.dataset.index, 10);
      const type = tickets[idx];

      if (btn.classList.contains('revealed-win') ||
          btn.classList.contains('revealed-lose')) {
        return;
      }

      if (type === 'win') {
        btn.classList.add('revealed-win');
        btn.textContent = '당첨!';
        revealedWin = true;
        lotResult.innerHTML = '<span class="win">당첨 제비를 찾았습니다!</span>';
      } else {
        btn.classList.add('revealed-lose');
        btn.textContent = '꽝';
        if (!revealedWin) {
          lotResult.innerHTML = '<span class="lose">아직 당첨이 남아 있어요.</span>';
        }
      }
    }

    makeTicketsBtn.addEventListener('click', makeTickets);
  </script>
</body>
</html>
