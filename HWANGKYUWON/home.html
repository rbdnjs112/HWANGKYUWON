    * { box-sizing: border-box; }

    body{
      margin:0;
      background:#111827;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:#111827;
    }

    .site-root{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

.global-header{
  position:sticky;
  top:0;
  z-index:50;
  background:#ffffff;
  border-bottom:3px solid #e5e7eb;
  box-shadow:0 2px 4px rgba(15,23,42,0.08);
}

.header-inner{
  width:100%;
  margin:0;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px 0 8px;
}

.header-left{
  display:flex;
  align-items:center;
}

.home-logo{
  border:none;
  background:transparent;
  padding:0;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#111827;
}

.home-logo span{
  font-size:22px;
  font-weight:900;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

.header-center{
  flex:1;
  display:flex;
  justify-content:center;
  gap:32px;
}

.nav-item{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  cursor:pointer;
  padding:4px 2px;
  min-width:80px;
}

.nav-link-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  text-decoration:none;
}

.nav-icon-placeholder{
  width:32px;
  height:32px;
}

.nav-label{
  font-size:14px;
  font-weight:700;
  white-space:nowrap;
  color:#111827;
}

.nav-label.active{
  color:#2563eb;
}

.nav-item::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-10px;
  transform:translateX(-50%);
  width:0;
  height:3px;
  background:#2563eb;
  border-radius:999px;
  transition:width 0.16s ease-out;
}

.nav-item:hover::after{
  width:60%;
}

.nav-item.active::after{
  width:80%;
}

.header-right{
  display:flex;
  align-items:center;
  gap:16px;
  padding-right:4px;
}

.header-right a{
  display:flex;
  align-items:center;
  justify-content:center;
}

.ext-icon{
  width:32px;
  height:32px;
  cursor:pointer;
  border:none;
  background:transparent;
  padding:0;
  transition:transform 0.12s ease-out, filter 0.12s ease-out;
  display:block;
}

.header-right a:hover .ext-icon{
  transform:scale(1.05);
  filter:brightness(1.05);
}

.dropdown{
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%);
  margin-top:10px;
  background:#ffffff;
  border-radius:12px;
  border:1px solid #d1d5db;
  box-shadow:0 8px 16px rgba(15,23,42,0.18);
  min-width:180px;
  overflow:hidden;
  z-index:60;
  display:none;
}

.nav-item:hover .dropdown{
  display:block;
}

.header-center .nav-item.open .dropdown{
  display:block;
}

.header-center .nav-item::before{
  content:"";
  position:absolute;
  top:100%;
  left:0;
  width:100%;
  height:10px;
}

.dropdown-item{
  display:block;
  width:100%;
  padding:9px 14px;
  font-size:14px;
  font-weight:500;
  text-align:center;
  border-bottom:1px solid #e5e7eb;
  background:#ffffff;
  color:#111827;
  text-decoration:none;
  white-space:nowrap;
}

.dropdown-item:last-child{
  border-bottom:none;
}

.dropdown-item:hover{
  background:#f3f4f6;
}

    /* ========== 메인 : 풀스크린 슬라이드 ========== */
    .main-wrap{
      flex:1;
      background:#020617;
    }

    .slider-root{
      width:100%;
      height:calc(100vh - 80px);      
      max-height:780px;
      position:relative;
      overflow:hidden;
      background:#000;
    }

    .slider-bg{
      position:absolute;
      inset:0;
      background-size:contain;
      background-position:center;
      background-repeat:no-repeat;
      transform:scale(1.02);
      transition:background-image 0.4s ease-out;
      cursor:pointer;
    }

    .slider-gradient-bar{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:90px;
      background: linear-gradient(90deg, #ff0000 0%, #ff0000 0%, #ffffff 100%);
    }

    .slider-center-panel{
      position:absolute;
      left:50%;
      bottom:24px;
      transform:translateX(-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      color:#f9fafb;
    }

    .event-banner{
      display:flex;
      align-items:center;
      gap:12px;
      padding:9px 22px;
      border-radius:999px;
      background:rgba(15,23,42,0.9);
      box-shadow:0 4px 10px rgba(15,23,42,0.7);
      font-size:13px;
      font-weight:600;
    }

    .event-link{
      text-decoration:none;
      color:#f9fafb;
      padding:4px 10px;
      border-radius:999px;
      background:transparent;
      transition:background 0.12s ease-out, color 0.12s ease-out;
    }

    .event-link:hover{
      background:#f9fafb;
      color:#111827;
    }

    .event-dot{
      width:4px;
      height:4px;
      border-radius:999px;
      background:#e5e7eb;
    }

    .slider-arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:64px;
      height:64px;
      border-radius:999px;
      border:none;
      background:#ffffff;
      box-shadow:0 4px 10px rgba(15,23,42,0.35);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:26px;
      color:#111827;
      opacity:0.9;
      transition:transform 0.12s ease-out, box-shadow 0.12s ease-out, opacity 0.12s ease-out;
    }

    .slider-arrow:hover{
      transform:translateY(-50%) scale(1.05);
      box-shadow:0 6px 14px rgba(15,23,42,0.45);
      opacity:1;
    }

    .slider-arrow.left{
      left:40px;
    }
    .slider-arrow.right{
      right:40px;
    }

    .slider-dots{
  position:absolute;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
  z-index:70;
}
    .slider-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:rgba(15,23,42,0.35);
    }
    .slider-dot.active{
      width:22px;
      background:#f9fafb;
    }

    @media (max-width:900px){
      .header-inner{
        padding:0 12px 0 8px;
        height:72px;
      }

        gap:18px;
      }
      .home-logo span{

      }
      .slider-root{
        height:calc(100vh - 72px);

      .slider-arrow{
        width:52px;
        height:52px;
        font-size:22px;
      }
      .slider-arrow.left{ left:18px; }
      .slider-arrow.right{ right:18px; }
    }

    @media (max-width:600px){

      }

      }
      .slider-gradient-bar{

    <div className="header-right">
      <a href={EXTERNAL_LINKS.youtube} target="_blank" rel="noopener">
        <img src={EXT_ICONS.youtube} alt="YouTube" className="ext-icon" />
      </a>
      <a href={EXTERNAL_LINKS.blog} target="_blank" rel="noopener">
        <img src={EXT_ICONS.blog} alt="Blog" className="ext-icon" />
      </a>
      <a href={EXTERNAL_LINKS.cafe} target="_blank" rel="noopener">
        <img src={EXT_ICONS.cafe} alt="Cafe" className="ext-icon" />
      </a>
    </div>
  </div>
</header>

          <main className="main-wrap">
            <div className="slider-root">
              <div
                className="slider-bg"
                style={{ backgroundImage:`url(${currentSlide.image})` }}
                onClick={handleSlideClick}
              />

              <div className="slider-gradient-bar" />
              <div className="slider-center-panel">
                <div className="event-banner">
                  <a
                    href={EVENT_NOTICE_LINKS.event}
                    className="event-link"
                  >
                    이벤트
                  </a>
                  <div className="event-dot" />
                  <a
                    href={EVENT_NOTICE_LINKS.notice}
                    className="event-link"
                  >
                    공지사항
                  </a>
                </div>
              </div>

              {SLIDES.length > 1 && (
                <>
                  <button
                    type="button"
                    className="slider-arrow left"
                    onClick={showPrevSlide}
                  >
                    ‹
                  </button>
                  <button
                    type="button"
                    className="slider-arrow right"
                    onClick={showNextSlide}
                  >
                    ›
                  </button>

                  <div className="slider-dots">
                    {SLIDES.map((s, idx) => (
                      <div
                        key={s.id}
                        className={
                          "slider-dot" + (idx === slideIndex ? " active" : "")
                        }
                      />
                    ))}
                  </div>
                </>
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
